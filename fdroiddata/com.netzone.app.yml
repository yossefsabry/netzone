AutoName: NetZone
Summary: Non-root firewall with per-app network controls
Description: |-
  NetZone is a non-root Android firewall that uses Android VpnService to
  control internet access per app.

  Features include:
  . Wi-Fi and mobile-data app blocking rules
  . Daily usage quota enforcement
  . Scheduled blocking windows
  . Local-only processing with no remote filtering server

  Permissions such as Usage Access, Query All Packages, and exact alarms are
  used only to power firewall rules and scheduling behavior.

