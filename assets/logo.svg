<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2979FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0A0A0F" rx="80" ry="80" />
  <!-- Left Curve -->
  <path d="M 140 100 C 130 180 135 280 200 340" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
  <!-- Right Curve -->
  <path d="M 260 100 C 270 180 265 280 200 340" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
</svg>
